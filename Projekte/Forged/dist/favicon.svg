<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#080808"/>

  <!-- Outer rim circle -->
  <circle cx="32" cy="32" r="26" stroke="#dc2626" stroke-width="2" fill="none"/>

  <!-- Inner ring -->
  <circle cx="32" cy="32" r="8" stroke="rgba(255,255,255,0.5)" stroke-width="1" fill="none"/>

  <!-- Hub dot -->
  <circle cx="32" cy="32" r="4" fill="#dc2626"/>

  <!-- 5 spokes at 72° intervals -->
  <line x1="32" y1="28" x2="32" y2="7"   stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="35.8" y1="29.2" x2="52.7" y2="18.8" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="34.9" y1="32.9" x2="48.5" y2="49.3" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="29.1" y1="32.9" x2="15.5" y2="49.3" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="28.2" y1="29.2" x2="11.3" y2="18.8" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
</svg>
